name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: surplus_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d surplus_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      ENV: dev
      DISABLE_RATE_LIMIT: "1"
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/surplus_db
      CORS_ORIGINS: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests + lint + security
        run: |
          pytest
          ruff check .
          bandit -r app -q
          pip-audit
